name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.0"]
        dependencies: ["prefer-stable", "prefer-lowest"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          extensions: json
          coverage: none

      - name: Cache Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-php-${{ matrix.php }}-${{ matrix.dependencies }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-${{ matrix.dependencies }}-composer-

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies (prefer-stable)
        if: matrix.dependencies == 'prefer-stable'
        run: composer update --no-interaction --no-progress --prefer-dist --prefer-stable

      - name: Install dependencies (prefer-lowest)
        if: matrix.dependencies == 'prefer-lowest'
        run: composer update --no-interaction --no-progress --prefer-dist --prefer-lowest

      - name: Static analysis (PHPStan)
        run: composer analyse

      - name: Static analysis (Psalm)
        if: matrix.dependencies == 'prefer-stable'
        run: php -dpcov.enabled=0 vendor/bin/psalm --config=psalm.xml.dist --no-progress

      - name: Run tests
        run: composer test
